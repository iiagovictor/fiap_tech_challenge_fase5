name: '2 - [PROD] Lint · Test · Build'

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint (ruff)
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependências de desenvolvimento
        run: |
          pip install --upgrade pip "setuptools<81"
          pip install -e ".[dev]"

      - name: Verificar estilo com ruff
        run: python -m ruff check src/ tests/

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Testes unitários + cobertura ≥ 60 %
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Testes unitários & cobertura
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependências (core + monitoring + security + dev)
        run: |
          pip install --upgrade pip "setuptools<81"
          pip install -e ".[monitoring,security,dev]"

      - name: Baixar modelo spaCy (presidio-analyzer)
        run: python -m spacy download en_core_web_lg

      - name: Executar testes unitários
        run: |
          python -m pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=60 \
            -v

      - name: Upload relatório de cobertura (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-xml
          path: coverage.xml
          retention-days: 14

      - name: Upload relatório de cobertura (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-html
          path: htmlcov/
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Docker build (valida que a imagem compila)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem de serving (sem push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/serving/Dockerfile
          push: false
          tags: fiap-tc-fase5-serving:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
